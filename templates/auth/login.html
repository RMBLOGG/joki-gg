{% extends "base.html" %}
{% block title %}Login - JokiGG{% endblock %}
{% block content %}
<div class="container page-content" style="max-width:440px">
    <div style="text-align:center;margin-bottom:32px">
        <h1 style="font-family:'Orbitron',sans-serif;font-size:1.8rem;color:var(--primary)">LOGIN</h1>
        <p style="color:var(--text-muted);margin-top:8px">Masuk ke akun JokiGG kamu</p>
    </div>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" required placeholder="email@contoh.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>
    <p style="text-align:center;margin-top:20px;color:var(--text-muted)">
        Belum punya akun? <a href="{{ url_for('auth.register') }}" style="color:var(--primary);font-weight:700">Daftar Sekarang</a>
    </p>
</div>
{% endblock %}
