{% extends "base.html" %}
{% block title %}Daftar - JokiGG{% endblock %}
{% block content %}
<div class="container page-content" style="max-width:480px">
    <div style="text-align:center;margin-bottom:32px">
        <h1 style="font-family:'Orbitron',sans-serif;font-size:1.8rem;color:var(--primary)">DAFTAR</h1>
        <p style="color:var(--text-muted);margin-top:8px">Buat akun JokiGG gratis</p>
    </div>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required placeholder="username kamu">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" required placeholder="email@contoh.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required placeholder="min. 6 karakter">
            </div>
            <div class="form-group">
                <label><i class="fas fa-id-badge"></i> Daftar Sebagai</label>
                <select name="role">
                    <option value="buyer">🎮 Buyer (Mau Joki)</option>
                    <option value="joki">⚡ Joki (Mau Jadi Joki)</option>
                </select>
            </div>
            <div id="joki-info" style="display:none;background:rgba(0,255,136,0.05);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px;font-size:0.9rem;color:var(--text-muted)">
                <i class="fas fa-info-circle" style="color:var(--primary)"></i>
                Akun joki perlu diverifikasi admin sebelum bisa menerima order.
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
                <i class="fas fa-user-plus"></i> Daftar Sekarang
            </button>
        </form>
    </div>
    <p style="text-align:center;margin-top:20px;color:var(--text-muted)">
        Sudah punya akun? <a href="{{ url_for('auth.login') }}" style="color:var(--primary);font-weight:700">Login</a>
    </p>
</div>
<script>
document.querySelector('select[name="role"]').addEventListener('change', function() {
    document.getElementById('joki-info').style.display = this.value === 'joki' ? 'block' : 'none';
});
</script>
{% endblock %}
