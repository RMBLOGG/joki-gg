{% extends "base.html" %}
{% block title %}Edit Layanan - JokiGG{% endblock %}
{% block content %}
<div class="container page-content" style="max-width:600px">
    <h1 style="font-family:'Orbitron',sans-serif;font-size:1.4rem;margin-bottom:24px">
        Edit <span style="color:var(--primary)">Layanan</span>
    </h1>
    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Judul Layanan</label>
                <input type="text" name="title" required value="{{ service.title }}">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                    <label>Rank Awal</label>
                    <input type="text" name="rank_from" value="{{ service.rank_from or '' }}">
                </div>
                <div class="form-group">
                    <label>Rank Target</label>
                    <input type="text" name="rank_to" value="{{ service.rank_to or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" name="price" required value="{{ service.price }}">
            </div>
            <div class="form-group">
                <label>Deskripsi</label>
                <textarea name="description" required>{{ service.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Thumbnail Baru (kosongkan jika tidak diubah)</label>
                <input type="file" name="thumbnail" accept="image/*">
                {% if service.thumbnail_url %}
                <img src="{{ service.thumbnail_url }}" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-top:8px">
                {% endif %}
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:10px">
                <input type="checkbox" name="is_active" id="is_active" {% if service.is_active %}checked{% endif %} style="width:auto">
                <label for="is_active" style="margin:0">Layanan Aktif</label>
            </div>
            <div style="display:flex;gap:10px">
                <a href="{{ url_for('joki.dashboard') }}" class="btn btn-outline" style="flex:1;justify-content:center">Batal</a>
                <button type="submit" class="btn btn-primary" style="flex:2;justify-content:center">
                    <i class="fas fa-save"></i> Simpan Perubahan
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
